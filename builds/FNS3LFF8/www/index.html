<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <meta http-equiv="cache-control" content="max-age=200" />
    <meta http-equiv="X-UA-Compatible" content="chrome=1" />

    <title>AquaOat</title>

    <link
        rel="stylesheet"
        type="text/css"
        href="animate.css"
        media="screen"
    />

    <link
        rel="stylesheet"
        type="text/css"
        href="global.css"
        media="screen"
    />

    <script src="jquery.min.js"></script>

    <script src="jquery.mobile.custom.min.js"></script>

    <script src="jquery.touchSwipe.min.js"></script>
    <script>

fetch("config.json")
.then(res => res.json())
.then(config => {

    const container =
      document.getElementById(
        "slide_jumper"
      );

    for(
      let i = 1;
      i <= config.slideCount;
      i++
    ){

        const div =
          document.createElement(
            "div"
          );

        div.className =
          "slides";

        div.innerHTML =
          `<img src="thumbs/${String(i).padStart(2,"0")}.jpg">`;

        container.appendChild(div);
    }
});

</script>
</head>

<body>

    <div id="wrapper" rel="1">

        <div class="menu">
            <img src="menu.png" width="37" alt="" />
        </div>

        <div class="slide_arrow">

                    src="left_arrow.png"
                    alt="previous icon"
                />
            </div>

            <div class="right_arrow">
                <img
                    src="right_arrow.png"
                    alt="next icon"
                />
            </div>

        </div>

        <div id="main_content"></div>

        <div class="reference active">

            <div class="box">

  class="slide_jumper"
  id="slide_jumper"
></div>

            </div>

        </div>

    <div id="myconsole"></div>

    <div id="click_through"></div>

    <script
        src="global.js"
        type="text/javascript"
        language="javascript"
    ></script>

    <script>

        // =========================
        // SCALE APP
        // =========================

        function scaleApp() {

            const baseWidth = 1024;
            const baseHeight = 768;

            const scaleX = window.innerWidth / baseWidth;
            const scaleY = window.innerHeight / baseHeight;

            const scale = Math.min(scaleX, scaleY);

            const wrapper =
                document.getElementById("wrapper");

            if (!wrapper) return;

            wrapper.style.transform =
                `scale(${scale})`;

            wrapper.style.left =
                (
                    window.innerWidth -
                    baseWidth * scale
                ) / 2 + "px";

            wrapper.style.top =
                (
                    window.innerHeight -
                    baseHeight * scale
                ) / 2 + "px";
        }

        window.addEventListener(
            "resize",
            scaleApp
        );

        window.addEventListener(
            "load",
            scaleApp
        );



        // =========================
        // PRELOAD ALL IMAGES
        // =========================

        function preloadAllImages(slideCount) {

    const imagePaths = [];

    for (let i = 1; i <= slideCount; i++) {

        imagePaths.push(`slide${i}/1.jpg`);

        imagePaths.push(
            `thumbs/${String(i).padStart(2, '0')}.jpg`
        );
    }

    imagePaths.push(
        "left_arrow.png",
        "right_arrow.png",
        "open.png",
        "close.png",
        "menu.png"
    );

    imagePaths.forEach((src) => {

        const img = new Image();

        img.decoding = "async";

        img.src = src;
    });

    console.log(
        `Preloaded ${slideCount} slides`
    );
}
fetch("config.json")
.then(res => res.json())
.then(config => {

    preloadAllImages(
        config.slideCount
    );

});
        



        // =========================
        // MAIN CONTENT
        // =========================

        $(document).ready(function () {

            var selectedContentPath =
                "slide1/";

            $("#main_content").html(

    `

            src="slide1/1.jpg"

            height="768"
        >

    </div>

    <div class="title1 frameopen"></div>
    `
);
        });

    </script>
