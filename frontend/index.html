<!DOCTYPE html>
<html>

<head>

  <title>APK Generator</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>

    body {
      font-family: Arial;
      padding: 40px;
      background: #f5f5f5;
    }

    h1 {
      margin-bottom: 30px;
    }

    input {
      padding: 12px;
      width: 320px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      outline: none;
    }
#terminal {
  width: 900px;
  height: 400px;
  background: #000;
  color: #00ff00;
  margin-top: 20px;
  margin-left:40px;
  overflow-y: auto;
  border-radius: 12px;
  font-family: monospace;
  white-space: pre-wrap;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
  line-height: 1.5;
}
    button {
      padding: 12px 20px;
      margin-left: 10px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .progress-container {
      width: 500px;
      height: 30px;
      background: #ddd;
      margin-top: 30px;
      border-radius: 20px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #2563eb;
      transition: width 0.3s;
    }

    #status {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

  </style>

</head>

<body>

  <h1>Generate APK</h1>

  <input
    type="text"
    id="appName"
    placeholder="Enter App Name"
  />
  <br><br>

<label>Slide 1</label>
<input type="file" id="slide1">

<br><br>

<label>Slide 2</label>
<input type="file" id="slide2">

<br><br>

<label>Slide 3</label>
<input type="file" id="slide3">

<br><br>

<label>Slide 4</label>
<input type="file" id="slide4">

<br><br>

<label>Slide 5</label>
<input type="file" id="slide5">

<br><br>

<label>Slide 6</label>
<input type="file" id="slide6">
<br><br>

<label>Slide 7</label>
<input type="file" id="slide7">
<br><br>

<label>Slide 8</label>
<input type="file" id="slide8">
<br><br>

<label>Slide 9</label>
<input type="file" id="slide9">
<br><br>

<label>Slide 10</label>
<input type="file" id="slide10">

    <button
  type="button"
  id="generateBtn">
  Generate
</button>


  <!-- PROGRESS BAR -->

  <div class="progress-container">

    <div
      class="progress-bar"
      id="progressBar">
    </div>

  </div>


  <!-- STATUS -->

  <div id="status">
    Ready...
  </div>
  <div id="terminal"></div>

  <script>

document
  .getElementById('generateBtn')
  .addEventListener(
    'click',
    generateApp
  );

async function generateApp(event) {

  if (event) {
    event.preventDefault();
  }

  const appName =
    document.getElementById(
      'appName'
    ).value.trim();

  if (!appName) {

    alert(
      'Please Enter App Name'
    );

    return;
  }

  const progressBar =
    document.getElementById(
      'progressBar'
    );

  const status =
    document.getElementById(
      'status'
    );

  const button =
    document.getElementById(
      'generateBtn'
    );

  button.disabled = true;

  button.innerText =
    'Generating...';

  try {

    const terminal =
      document.getElementById(
        'terminal'
      );

    terminal.innerHTML = '';

    // CREATE FORMDATA
    const formData =
      new FormData();

    formData.append(
      'appName',
      appName
    );

    // ADD SLIDE FILES
    for (
      let i = 1;
      i <= 10;
      i++
    ) {

      const file =
        document.getElementById(
          `slide${i}`
        ).files[0];

      if (file) {

        formData.append(
          `slide${i}`,
          file
        );

      }

    }

    const response =
      await fetch(
        'http://localhost:5000/generate',
        {
          method: 'POST',
          body: formData
        }
      );

    if (!response.ok) {

      throw new Error(
        'Build Failed'
      );

    }

    const data =
      await response.json();

    progressBar.style.width =
      '100%';

    status.innerText =
      'APK Generated Successfully!';

    console.log(data);

    if (data.downloadUrl) {

      window.location.href =
        data.downloadUrl;

    }

    setTimeout(() => {

      progressBar.style.width =
        '0%';

      status.innerText =
        'Ready For Next APK';

      document.getElementById(
        'appName'
      ).value = '';

      button.disabled = false;

      button.innerText =
        'Generate';

    }, 2000);

  } catch (err) {

    console.error(err);

    progressBar.style.width =
      '0%';

    status.innerText =
      'Build Failed ❌';

    button.disabled = false;

    button.innerText =
      'Generate';

  }

}


// SOCKET

const socket =
  io(
    'https://cruciate-aria-overapprehensively.ngrok-free.dev',
    {
      transports: [
        'websocket',
        'polling'
      ]
    }
  );

socket.on(
  'connect',
  () => {

    console.log(
      'Socket Connected'
    );

    const terminal =
      document.getElementById(
        'terminal'
      );

    terminal.innerHTML +=
      '⚡ Connected To Server<br><br>';

  }
);

socket.on(
  'terminal-log',
  (log) => {

    const terminal =
      document.getElementById(
        'terminal'
      );

    terminal.innerHTML +=
      log.replace(
        /\n/g,
        '<br>'
      );

    terminal.scrollTop =
      terminal.scrollHeight;

  }
);

socket.on(
  'connect_error',
  (err) => {

    console.log(err);

    const terminal =
      document.getElementById(
        'terminal'
      );

    terminal.innerHTML +=
      '❌ Socket Connection Failed<br>';

  }
);

</script>

</body>
</html>
